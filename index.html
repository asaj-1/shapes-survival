<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Survive Shapes</title>
<style>
  body { margin:0; overflow:hidden; background:#000; color:#fff; font-family:Arial;}
  #menu {
    position:absolute; top:0; left:0; width:100%; height:100%; background:#000;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    z-index:10;
  }
  #menu h1 { font-size:60px; margin-bottom:40px; }
  #menu button {
    padding:20px 50px; font-size:24px; cursor:pointer;
    background:#111; color:#fff; border:2px solid #fff;
  }
  #menu button:hover { background:#222; }
  #score { position:absolute; top:10px; left:10px; font-size:20px; z-index:5;}
  canvas { display:block; }
</style>
</head>
<body>

<div id="menu">
  <h1>Survive Shapes</h1>
  <button id="startBtn">Start Game</button>
</div>

<div id="score">Wave: 1 | Shapes Survived: 0</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const WALL_THICKNESS = 20;

/* SMALLER PLAYER */
const player = { 
  x: canvas.width/2, 
  y: canvas.height/2, 
  size: 6, 
  speed: 5 
};

let keys = {};
let shapes = [];
let wave = 1;
let shapesSurvived = 0;
let spawnInterval = 2000;
let lastSpawn = 0;
let spawnWarning = null;
const colors = ['#ff0000','#00ff00','#0000ff'];
let gameRunning = false;

window.addEventListener('keydown', e => keys[e.key]=true);
window.addEventListener('keyup', e => keys[e.key]=false);

class Shape {
  constructor(type,x=null,y=null){
    this.type=type;
    this.color=colors[Math.floor(Math.random()*colors.length)];

    /* SMALLER SHAPES */
    this.size=5+Math.random()*2;

    this.x=x!==null ? x : Math.random()*(canvas.width-2*WALL_THICKNESS)+WALL_THICKNESS;
    this.y=y!==null ? y : Math.random()*(canvas.height-2*WALL_THICKNESS)+WALL_THICKNESS;
    this.speed=1 + wave*0.2;
    this.vx=0; this.vy=0;
    this.dashCooldown=0;
    this.crashed=false;
    this.dashDelay=0;
    this.warning=false;
    this.lifespan=20000;
    this.spawnTime=Date.now();
    this.dashQueue=0;
    this.hexTraced=false;
    this.triangleDashing=false;
  }

  update(){
    const now = Date.now();

    if(now - this.spawnTime > this.lifespan &&
       !['trapezoid','triangle'].includes(this.type)){
      shapes.splice(shapes.indexOf(this),1);
      return;
    }

    switch(this.type){
      case 'circle':
        this.trackPlayer(0.6);
        break;

      case 'triangle':
        if(this.dashDelay>0){
          this.dashDelay--;
          this.warning=true;
          break;
        }
        if(!this.triangleDashing){
          const angle=Math.atan2(player.y-this.y,player.x-this.x);
          this.vx=Math.cos(angle)*6;
          this.vy=Math.sin(angle)*6;
          this.triangleDashing=true;
          this.warning=false;
        }
        break;

      case 'square':
        this.speed+=0.03; // faster acceleration
        this.trackPlayer(0.6);
        break;

      case 'pentagon':
        if(this.dashDelay>0){
          this.dashDelay--;
          this.warning=true;
          break;
        }
        if(this.dashCooldown<=0 && this.dashQueue>0){
          const angle=Math.atan2(player.y-this.y,player.x-this.x);
          this.vx=Math.cos(angle)*8;
          this.vy=Math.sin(angle)*8;
          this.dashCooldown=90;
          this.warning=false;
          this.dashQueue--;
          if(this.dashQueue>0) this.dashDelay=90;
        } else if(this.dashCooldown>0){
          this.dashCooldown--;
        }
        break;

      case 'hexagon':
        if(!this.crashed){
          if(this.vx===0 && this.vy===0){
            const angle=Math.random()*Math.PI*2;
            this.vx=Math.cos(angle)*2;
            this.vy=Math.sin(angle)*2;
          }
        } else if(!this.hexTraced){
          const angle=Math.atan2(player.y-this.y,player.x-this.x);
          this.vx=Math.cos(angle)*4;
          this.vy=Math.sin(angle)*4;
          this.hexTraced=true;
        }
        break;

      case 'trapezoid':
        this.vy += 0.8;
        break;
    }

    this.x += this.vx;
    this.y += this.vy;

    let collided=false;

    if(this.type!=='trapezoid'){
      if(this.x < WALL_THICKNESS || this.x > canvas.width-WALL_THICKNESS){
        this.vx*=-1;
        collided=true;
        if(this.type==='square'){ this.vx*=0.2; }
        if(this.type==='hexagon'){ this.crashed=true; }
      }

      if(this.y < WALL_THICKNESS || this.y > canvas.height-WALL_THICKNESS){
        this.vy*=-1;
        collided=true;
        if(this.type==='square'){ this.vy*=0.2; }
        if(this.type==='hexagon'){ this.crashed=true; }
      }

      if(this.type==='triangle' && this.triangleDashing && collided){
        shapes.splice(shapes.indexOf(this),1);
        return;
      }
    }

    if(this.type==='trapezoid' && this.y > canvas.height){
      shapes.splice(shapes.indexOf(this),1);
    }
  }

  trackPlayer(mult){
    const angle=Math.atan2(player.y-this.y,player.x-this.x);
    this.vx=Math.cos(angle)*this.speed*mult;
    this.vy=Math.sin(angle)*this.speed*mult;
  }

  draw(){
    ctx.fillStyle=this.color;
    ctx.beginPath();

    if(this.warning){
      ctx.strokeStyle="#ffffff";
      ctx.lineWidth=1;
      ctx.arc(this.x,this.y,this.size*2,0,Math.PI*2);
      ctx.stroke();
    }

    switch(this.type){
      case 'circle':
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        break;

      case 'triangle':
        ctx.moveTo(this.x,this.y-this.size);
        ctx.lineTo(this.x-this.size,this.y+this.size);
        ctx.lineTo(this.x+this.size,this.y+this.size);
        ctx.closePath();
        break;

      case 'square':
        ctx.fillRect(this.x-this.size,this.y-this.size,this.size*2,this.size*2);
        return;

      case 'pentagon':
        for(let i=0;i<5;i++){
          const a=i*2*Math.PI/5-Math.PI/2;
          const px=this.x+this.size*Math.cos(a);
          const py=this.y+this.size*Math.sin(a);
          i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.closePath();
        break;

      case 'hexagon':
        for(let i=0;i<6;i++){
          const a=i*2*Math.PI/6-Math.PI/2;
          const px=this.x+this.size*Math.cos(a);
          const py=this.y+this.size*Math.sin(a);
          i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.closePath();
        break;

      case 'trapezoid':
        ctx.moveTo(this.x-this.size,this.y-this.size);
        ctx.lineTo(this.x+this.size,this.y-this.size);
        ctx.lineTo(this.x+this.size*0.6,this.y+this.size);
        ctx.lineTo(this.x-this.size*0.6,this.y+this.size);
        ctx.closePath();
        break;
    }

    ctx.fill();
  }
}

function availableShapes(){
  const list=['circle'];
  if(shapesSurvived>=4) list.push('square');
  if(shapesSurvived>=8) list.push('triangle');
  if(shapesSurvived>=11) list.push('hexagon');
  if(shapesSurvived>=12) list.push('pentagon');
  if(shapesSurvived>=15) list.push('trapezoid');
  return list;
}

function scheduleShapeSpawn(){
  const types=availableShapes();
  const type=types[Math.floor(Math.random()*types.length)];

  let x=Math.random()*(canvas.width-2*WALL_THICKNESS)+WALL_THICKNESS;
  let y=Math.random()*(canvas.height-2*WALL_THICKNESS)+WALL_THICKNESS;

  if(type==='trapezoid'){ y=-20; }

  spawnWarning={x,y,type,time:Date.now()};
}

function handleSpawning(){
  const now=Date.now();

  if(!spawnWarning && now-lastSpawn>spawnInterval){
    scheduleShapeSpawn();
    lastSpawn=now;
  }

  if(spawnWarning && now-spawnWarning.time>1000){
    const shape=new Shape(spawnWarning.type,spawnWarning.x,spawnWarning.y);

    if(shape.type==='triangle') shape.dashDelay=90;
    if(shape.type==='pentagon'){ shape.dashDelay=90; shape.dashQueue=3; }

    shapes.push(shape);
    shapesSurvived++;
    spawnWarning=null;
  }
}

function update(){
  if(!gameRunning) return;

  if(keys['w']||keys['ArrowUp']) player.y-=player.speed;
  if(keys['s']||keys['ArrowDown']) player.y+=player.speed;
  if(keys['a']||keys['ArrowLeft']) player.x-=player.speed;
  if(keys['d']||keys['ArrowRight']) player.x+=player.speed;

  player.x=Math.max(WALL_THICKNESS,Math.min(canvas.width-WALL_THICKNESS,player.x));
  player.y=Math.max(WALL_THICKNESS,Math.min(canvas.height-WALL_THICKNESS,player.y));

  shapes.forEach(s=>s.update());

  for(let s of shapes){
    const dx=s.x-player.x;
    const dy=s.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<s.size+player.size){
      alert(`Game Over! Survived: ${shapesSurvived}`);
      location.reload();
    }
  }

  handleSpawning();

  if(shapesSurvived>wave*10){
    wave++;
    spawnInterval*=0.9;
  }

  document.getElementById('score').innerText=
    `Wave: ${wave} | Shapes Survived: ${shapesSurvived}`;
}

function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#1c1c1c';
  ctx.fillRect(0,0,canvas.width,WALL_THICKNESS);
  ctx.fillRect(0,canvas.height-WALL_THICKNESS,canvas.width,WALL_THICKNESS);
  ctx.fillRect(0,0,WALL_THICKNESS,canvas.height);
  ctx.fillRect(canvas.width-WALL_THICKNESS,0,WALL_THICKNESS,canvas.height);

  if(gameRunning){
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
    ctx.fill();

    shapes.forEach(s=>s.draw());

    if(spawnWarning){
      const alpha=0.5+0.5*Math.sin(Date.now()/100);
      ctx.fillStyle=`rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(spawnWarning.x,spawnWarning.y,10,0,Math.PI*2);
      ctx.fill();
    }
  }
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

document.getElementById('startBtn').onclick=()=>{
  document.getElementById('menu').style.display='none';
  gameRunning=true;
};
</script>
</body>
</html>
